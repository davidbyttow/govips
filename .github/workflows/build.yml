name: build

on: [push, pull_request]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get -y install libvips-dev

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
